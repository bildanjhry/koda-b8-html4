<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Perokok</title>
</head>
<body>
    <div>
        <h1 id="title">Survey Perokok</h1>
        <div id="form-wrapper" align="start">
            <form action="./table-survey/index.html" id="form-surver-perokok">
                <div>
                    <label for="name">Siapa nama anda?</label>
                    <div>
                        <input type="text" name="name" id="name">
                    </div>
                     <label for="age">Berapa umur anda?</label>
                     <div>
                        <input type="number" name="age" id="age">
                     </div>
                </div>
                <div>
                    <label>Apa jenis kelamin anda?</label>
                    <div>
                        <input type="radio" name="gender" id="male" value="male">
                        <label for="male">Laki-laki</label>
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="female">Perempuan</label>
                    </div>
                </div>
                <div>
                    <label>Apakah anda perokok?</label>
                    <div>
                        <input type="radio" name="smoker" id="ya" value="ya">
                        <label for="ya">Ya</label>
                        <input type="radio" name="smoker" id="tidak" value="tidak">
                        <label for="tidak">Tidak</label>
                    </div>
                </div>
                <div>
                    <label>Jika anda perokok, rokok apa yang anda pernah coba?</label>
                    <div>
                        <input type="checkbox" name="gudang-garam-filter" id="gudang-garam-filter">
                        <label for="gudang-garam-filter">Gudang Garam Filter</label>
                    </div>
                    <div>
                        <input type="checkbox" name="lucky-strike" id="lucky-strike">
                        <label for="lucky-strike">Lucky Strike</label>
                    </div>
                    <div>
                        <input type="checkbox" name="marlboro" id="marlboro">
                        <label for="marlboro">Marlboro</label>
                    </div>
                    <div>
                        <input type="checkbox" name="esse" id="esse">
                        <label for="esse">Esse</label>
                    </div>
                    <div>
                        <button type="submit">Submit</button>
                        <button type="reset">Reset</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
